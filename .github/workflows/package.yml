name: Standalone package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Build standalone artifact
        run: uv run python packaging/build.py

      - name: Smoke test standalone artifact
        run: uv run python packaging/smoke.py

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: demi-${{ matrix.os }}
          path: dist/standalone
          if-no-files-found: error
